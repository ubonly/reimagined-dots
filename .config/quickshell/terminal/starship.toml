# Auto-generated by Quickshell Matugen pipeline.
add_newline = false

# ChromeOS-style two-line prompt based on govno_ebanoe's starship shape.
format = """
$cmd_duration $directory
  $character"""

[fill]
symbol = '-'
style = 'fg:245'

[character]
success_symbol = "[вҖў пҒӢ](bold fg:#bbc3ff)"
error_symbol = "[вҖў пҖҚ](bold fg:#ffb4ab)"

[package]
disabled = true

[git_branch]
style = "bg: 252"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:252)[$symbol $branch(:$remote_branch)](fg:235 bg:252)[оӮҙ ](bold fg:252)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:252 bold fg:235)[оӮҙ](bold fg:252)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:252 fg:235"
style_root = "red bold"
format = "[оӮ¶](bold fg:252)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "пҖ•"
read_only = " п‘– "
style = "bg:#bbc3ff fg:#232c61"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:#bbc3ff)[пҒ» вҶ’ пҖ•]($style)[оӮҙ](bold fg:#bbc3ff)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#3a4379)[у°Әў $duration](bold bg:#3a4379 fg:#dfe0ff)[оӮҙ](bold fg:#3a4379)'
