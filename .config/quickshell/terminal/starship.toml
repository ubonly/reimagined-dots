# Auto-generated by Quickshell Matugen pipeline.
add_newline = false
format = "$cmd_duration$directory$git_branch\n  $character"

palette = "matugen"

[palettes.matugen]
primary = "bbc3ff"
on_primary = "232c61"
primary_container = "3a4379"
on_primary_container = "dfe0ff"
secondary = "c4c5dd"
secondary_container = "434559"
on_secondary_container = "e0e1f9"
tertiary = "e6bad7"
tertiary_container = "5d3c54"
on_tertiary_container = "ffd7f0"
surface = "1f1f25"
surface_low = "1b1b21"
surface_high = "29292f"
on_surface = "e4e1e9"
on_surface_variant = "c7c5d0"
error = "ffb4ab"

[character]
success_symbol = "[• ](bold fg:primary)"
error_symbol = "[ ](bold fg:error)"

[directory]
home_symbol = " "
read_only = " "
truncation_length = 2
truncation_symbol = "../"
style = "fg:on_primary_container bg:primary_container"
format = "[](fg:primary_container)[󰉋 → $path]($style)[](fg:primary_container)"

[directory.substitutions]
"Desktop" = "󰇄 "
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = "󰝚 "
"Pictures" = "󰉏 "
"Videos" = "󰕧 "
"GitHub" = "󰊤 "

[git_branch]
symbol = "󰘬"
style = "fg:on_secondary_container bg:secondary_container"
format = " [](fg:secondary_container)[$symbol $branch]($style)[](fg:secondary_container)"
truncation_length = 12
truncation_symbol = ""

[git_status]
style = "fg:secondary"
format = "([$all_status$ahead_behind]($style) )"

[cmd_duration]
min_time = 0
style = "bold fg:on_tertiary_container bg:tertiary_container"
format = "[](fg:tertiary_container)[󰪢 $duration]($style)[ ](fg:tertiary_container)"

[package]
disabled = true

[line_break]
disabled = false
